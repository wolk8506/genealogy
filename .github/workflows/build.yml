name: Build & Release Electron App

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. x.y.z)"
        required: true

permissions:
  contents: write

jobs:
  # --- Сборка для macOS ---
  build-mac:
    name: Build macOS .dmg
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"

      - name: Install deps
        run: npm ci --legacy-peer-deps

      - name: Build React
        run: npm run build:react

      - name: Build DMG (ARM64)
        run: npx electron-builder --mac --arm64 --publish never

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v6
        with:
          name: macos-build
          path: dist_electron/

  # --- Сборка для Windows ---
  build-win:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"

      - name: Install deps
        run: npm ci --legacy-peer-deps

      - name: Build React
        run: npm run build:react

      - name: Build Windows installer
        run: npm run dist:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v6
        with:
          name: windows-build
          path: dist_electron/

  # --- Сборка для Linux ---
  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"

      - name: Install deps
        run: npm ci --legacy-peer-deps

      - name: Build React
        run: npm run build:react

      - name: Build AppImage
        run: npm run dist:linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v6
        with:
          name: linux-build
          path: dist_electron/

  # --- Создание Релиза ---
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-mac, build-win, build-linux]
    steps:
      - uses: actions/checkout@v6

      # Скачиваем всё, что собрали в предыдущих шагах
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: "Release ${{ github.event.inputs.version }}"
          draft: false
          prerelease: false
          # Указываем пути ко ВСЕМ файлам разом.
          # Это заменяет те 10 блоков "Upload release asset", что были в конце твоего файла.
          files: |
            artifacts/windows-build/*.exe
            artifacts/windows-build/*.blockmap
            artifacts/windows-build/latest.yml
            artifacts/macos-build/*.dmg
            artifacts/macos-build/*.blockmap
            artifacts/macos-build/latest-mac.yml
            artifacts/linux-build/*.AppImage
            artifacts/linux-build/latest-linux.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
